[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # quick-xml DoS advisories. Only reachable via wayland-scanner, a build-time
    # proc-macro that parses the trusted, bundled Wayland-protocol XML files;
    # never attacker-controlled runtime input. Pinned to ^0.39 by wayland-scanner,
    # so it cannot be upgraded to the fixed >=0.41 without an upstream winit bump.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "CC0-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
allow-git = ["https://github.com/Zitronenjoghurt/egui-phosphor"]
unknown-registry = "deny"
unknown-git = "deny"
